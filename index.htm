<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Ascend</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2023.11.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2023.11.1/core.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            touch-action: manipulation;
        }
        h1 { margin-bottom: 5px; }
        #message { height: 30px; margin-bottom: 10px; font-weight: bold; text-align: center; }
        
        /* New styling for the timer */
        #timer { 
            height: 30px; 
            margin-bottom: 20px; 
            font-size: 24px; 
            font-weight: bold; 
            color: #ff5555; 
        }
        
        #game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }
        
        .tile {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #888888;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .tile:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>Number Ascend</h1>
    <div id="message">Loading game logic...</div>
    <div id="timer"></div> <div id="game-board"></div>

    <script type="py">
        import asyncio
        from pyscript import document, window
        from pyodide.ffi import create_proxy
        import random

        # Game State
        current_level = 1
        max_level = 10
        expected_num = 1
        time_left = 5
        timer_task = None # Will hold our background timer

        # 1. The Asynchronous Timer Function
        async def countdown():
            global time_left, current_level
            
            while time_left > 0:
                document.getElementById("timer").innerText = f"⏳ {time_left}s"
                await asyncio.sleep(1) # Waits 1 second without freezing the browser
                time_left -= 1
                
            # If the loop finishes, time ran out!
            document.getElementById("timer").innerText = "⏳ 0s"
            document.getElementById("message").innerText = f"⏰ Time's up! Restarting Level {current_level}..."
            
            # Wait 1.5 seconds so the player can read the message, then restart
            await asyncio.sleep(1.5)
            start_level(current_level)

        # 2. Handling Player Taps
        def handle_click(event):
            global expected_num, current_level, timer_task
            
            btn = event.target
            num = int(btn.innerText)
            
            if num == expected_num:
                btn.style.visibility = "hidden"
                expected_num += 1
                
                num_tiles = current_level + 2
                if expected_num > num_tiles:
                    # Level Complete! Cancel the countdown timer.
                    if timer_task:
                        timer_task.cancel()
                        
                    if current_level == max_level:
                        document.getElementById("message").innerText = "🏆 Game Over - You Win!"
                        document.getElementById("timer").innerText = ""
                        document.getElementById("game-board").innerHTML = ""
                    else:
                        current_level += 1
                        start_level(current_level)
            else:
                # Wrong tap! Cancel timer and restart.
                if timer_task:
                    timer_task.cancel()
                
                document.getElementById("message").innerText = f"❌ Wrong! Tap {expected_num} first."
                # Use browser's setTimeout to delay the restart by 1.5 seconds
                window.setTimeout(create_proxy(lambda: start_level(current_level)), 1500)

        click_proxy = create_proxy(handle_click)

        # 3. Setting up the Level
        def start_level(level):
            global expected_num, time_left, timer_task
            
            expected_num = 1
            time_left = 5 # Reset timer to 5 seconds
            
            # If a timer is already running (from a previous level), stop it
            if timer_task:
                timer_task.cancel()
                
            board = document.getElementById("game-board")
            board.innerHTML = "" 
            document.getElementById("message").innerText = f"Level {level}: Tap numbers in order"
            document.getElementById("timer").innerText = f"⏳ {time_left}s"

            num_tiles = level + 2
            numbers = list(range(1, num_tiles + 1))
            random.shuffle(numbers)

            for num in numbers:
                btn = document.createElement("div")
                btn.className = "tile"
                btn.innerText = str(num)
                btn.addEventListener("click", click_proxy)
                board.appendChild(btn)
                
            # Start the background timer loop
            timer_task = asyncio.ensure_future(countdown())

        # Initialize
        start_level(current_level)
    </script>
</body>
</html>
